<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Giocatore</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>




<div th:replace="~{fragments/navbar :: navbar}">

</div>





<div class="container page-box form-box">





    <h1>

        Gestione Giocatore

    </h1>






    <form th:action="@{/admin/players/save}"

          th:object="${player}"

          method="post"

          enctype="multipart/form-data">






        <input type="hidden"

               th:field="*{id}">









        <label class="form-label">

            Nome

        </label>



        <input class="form-control"

               type="text"

               th:field="*{firstName}">





        <label class="form-label mt-3">

            Cognome

        </label>




        <input class="form-control"

               type="text"

               th:field="*{lastName}">







        <label class="form-label mt-3">

            Data nascita

        </label>




        <input class="form-control"

               type="date"

               th:field="*{birthDate}">







        <label class="form-label mt-3">

            Ruolo

        </label>





        <input class="form-control"

               type="text"

               th:field="*{role}">








        <label class="form-label mt-3">

            Altezza

        </label>





        <input class="form-control"

               type="number"

               th:field="*{height}">










        <label class="form-label mt-3">

            Squadra

        </label>






        <select class="form-select"

                th:field="*{team}">






            <option th:each="team : ${teams}"

                    th:value="${team.id}"

                    th:text="${team.name}">


            </option>






        </select>









        <label class="form-label mt-3">

            Foto giocatore

        </label>





        <input class="form-control"

               type="file"

               name="file">







        <div class="mt-3"

             th:if="${player.image != null}">



            <p>

                Foto attuale:

            </p>



            <img th:src="@{'/images/' + ${player.image}}"

                 width="140"

                 class="rounded shadow">



        </div>









        <button class="btn btn-primary mt-4"

                type="submit">



            Salva giocatore



        </button>






    </form>





</div>





</body>


</html>
