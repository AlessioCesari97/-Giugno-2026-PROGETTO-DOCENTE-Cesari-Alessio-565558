<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Tornei</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>


<div th:replace="~{fragments/navbar :: navbar}">
</div>





<div class="container page-box">



    <h1>

        Tornei disponibili

    </h1>





    <div class="row">



        <div class="col-md-4"
             th:each="tournament : ${tournaments}">



            <div class="dashboard-card">



                <h3 th:text="${tournament.name}">

                </h3>




                <p>

                    Anno:

                    <span th:text="${tournament.year}">

</span>

                </p>





                <a class="btn btn-primary"

                   th:href="@{/tournaments/{id}(id=${tournament.id})}">


                    Dettagli


                </a>





            </div>


        </div>




    </div>




</div>




</body>


</html>
