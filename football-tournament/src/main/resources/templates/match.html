<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">



<head>


    <title>Dettaglio Partita</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>





<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>







<div class="container page-box">






    <div class="match-detail-card text-center">





        <h1>


            <a class="custom-link"

               th:href="@{/teams/{id}(id=${match.homeTeam.id})}"

               th:text="${match.homeTeam.name}">

            </a>





            ⚽





            <a class="custom-link"

               th:href="@{/teams/{id}(id=${match.awayTeam.id})}"

               th:text="${match.awayTeam.name}">

            </a>



        </h1>









        <div class="big-score"

             th:if="${match.status.name() == 'PLAYED'}">



            <span th:text="${match.goalsHome}">

            </span>



            -



            <span th:text="${match.goalsAway}">

            </span>



        </div>







        <div class="alert alert-info mt-3"

             th:if="${match.status.name() == 'SCHEDULED'}">



            Partita programmata



        </div>









        <hr>







        <p>

            📍

            <strong>Luogo:</strong>


            <span th:text="${match.location}">

            </span>


        </p>







        <p>

            📅

            <strong>Data:</strong>


            <span th:text="${match.dateTime}">

            </span>


        </p>







        <p>


            Stato:


            <span class="badge bg-success"

                  th:text="${match.status}">


            </span>


        </p>







        <p>


            👨‍⚖️ Arbitro:



            <span th:text="${match.referee.firstName}">

            </span>



            <span th:text="${match.referee.lastName}">

            </span>



        </p>






    </div>














    <h2>

        💬 Commenti

    </h2>







    <div th:each="comment : ${match.comments}"

         class="comment-box">







        <h5 th:text="${comment.user.username}">

        </h5>







        <p th:text="${comment.text}">

        </p>








        <a sec:authorize="isAuthenticated()"

           class="btn btn-warning btn-sm"


           th:href="@{/comments/{id}/edit(id=${comment.id})}">



            Modifica


        </a>






    </div>











    <div sec:authorize="isAuthenticated()">






        <h3 class="mt-4">

            Aggiungi commento

        </h3>








        <form th:action="@{/comments/match/{id}(id=${match.id})}"

              method="post">







            <textarea name="text"

                      class="form-control"

                      rows="4"

                      placeholder="Scrivi un commento...">

            </textarea>









            <button class="btn btn-primary mt-3"

                    type="submit">



                Pubblica



            </button>







        </form>






    </div>









    <div sec:authorize="!isAuthenticated()"

         class="alert alert-info mt-4">



        Devi effettuare il login per commentare.


        <a href="/login">

            Login

        </a>



    </div>









    <button onclick="history.back()"

            class="btn btn-secondary mt-4">


        Indietro


    </button>








</div>





</body>


</html>
