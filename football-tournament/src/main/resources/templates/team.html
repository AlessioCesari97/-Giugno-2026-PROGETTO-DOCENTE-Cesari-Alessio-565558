<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Squadra</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>





<div class="container page-box">





    <h1 th:text="${team.name}">

    </h1>





    <img th:if="${team.image != null}"

         th:src="@{'/images/' + ${team.image}}"

         class="team-logo">






    <p>

        📍 Città:

        <strong th:text="${team.city}">

        </strong>


    </p>






    <p>

        Fondazione:

        <strong th:text="${team.foundationYear}">

        </strong>


    </p>









    <h2>

        Giocatori

    </h2>








    <table class="table table-hover clickable-table">



        <thead>


        <tr>

            <th>Nome</th>

            <th>Cognome</th>

            <th>Ruolo</th>

        </tr>


        </thead>






        <tbody>





        <tr th:each="player : ${team.players}"


            th:onclick="|window.location.href='@{/players/{id}(id=${player.id})}'|">





            <td th:text="${player.firstName}">

            </td>





            <td th:text="${player.lastName}">

            </td>






            <td th:text="${player.role}">

            </td>





        </tr>





        </tbody>




    </table>









    <a href="javascript:history.back()"

       class="btn btn-secondary">


        ← Indietro


    </a>






</div>




</body>


</html>
