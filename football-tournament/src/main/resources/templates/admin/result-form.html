<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Risultato</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">



    <link rel="stylesheet"
          href="/css/style.css">


</head>





<body>




<div th:replace="~{fragments/navbar :: navbar}">

</div>







<div class="container page-box form-box">





    <h1>

        Inserisci risultato

    </h1>








    <h2 class="text-center">


<span th:text="${match.homeTeam.name}">

</span>


        VS


        <span th:text="${match.awayTeam.name}">

</span>


    </h2>









    <form th:action="@{/admin/matches/{id}/result(id=${match.id})}"

          method="post">







        <label class="form-label">

            Goal casa

        </label>




        <input class="form-control"

               type="number"

               name="goalsHome">







        <label class="form-label mt-3">

            Goal trasferta

        </label>





        <input class="form-control"

               type="number"

               name="goalsAway">









        <button class="btn btn-success mt-4"

                type="submit">



            Salva risultato



        </button>







    </form>






</div>






</body>



</html>
