<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>



    <title>Gestione Squadre</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">



    <link rel="stylesheet"
          href="/css/style.css">



</head>





<body>





<div th:replace="~{fragments/navbar :: navbar}">

</div>








<div class="container page-box">







    <h1>

        Gestione Squadre

    </h1>









    <a href="/admin/teams/new"

       class="btn btn-primary mb-3">


        + Nuova squadra


    </a>

    


    <div class="alert alert-danger"

         th:if="${error}"

         th:text="${error}">

    </div>






    <div class="alert alert-success"

         th:if="${success}"

         th:text="${success}">

    </div>












    <table class="table table-hover">



        <thead>



        <tr>



            <th>

                Logo

            </th>



            <th>

                Nome

            </th>




            <th>

                Città

            </th>





            <th>

                Fondazione

            </th>




            <th>

                Azioni

            </th>



        </tr>



        </thead>










        <tbody>





        <tr th:each="team : ${teams}">








            <td>



                <img th:if="${team.image != null}"

                     th:src="@{'/images/' + ${team.image}}"

                     width="70"

                     class="rounded">



            </td>








            <td th:text="${team.name}">

            </td>






            <td th:text="${team.city}">

            </td>






            <td th:text="${team.foundationYear}">

            </td>









            <td>







                <a class="btn btn-warning btn-sm"

                   th:href="@{/admin/teams/edit/{id}(id=${team.id})}">



                    Modifica



                </a>










                <form th:action="@{/admin/teams/delete/{id}(id=${team.id})}"

                      method="post"

                      style="display:inline">





                    <button class="btn btn-danger btn-sm"

                            onclick="return confirm('Eliminare squadra?')">



                        Elimina



                    </button>





                </form>






            </td>





        </tr>





        </tbody>







    </table>








</div>






</body>



</html>
