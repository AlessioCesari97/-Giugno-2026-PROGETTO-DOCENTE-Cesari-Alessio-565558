<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Squadra</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>





<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>








<div class="container page-box form-box">





    <h1>

        Gestione Squadra

    </h1>






    <form th:action="@{/admin/teams/save}"

          th:object="${team}"

          method="post"

          enctype="multipart/form-data">








        <input type="hidden"

               th:field="*{id}">







        <label class="form-label">

            Nome

        </label>




        <input class="form-control"

               type="text"

               th:field="*{name}">





        <div class="text-danger"

             th:if="${#fields.hasErrors('name')}"

             th:errors="*{name}">

        </div>









        <label class="form-label mt-3">

            Città

        </label>





        <input class="form-control"

               type="text"

               th:field="*{city}">






        <div class="text-danger"

             th:if="${#fields.hasErrors('city')}"

             th:errors="*{city}">

        </div>









        <label class="form-label mt-3">

            Anno fondazione

        </label>






        <input class="form-control"

               type="number"

               th:field="*{foundationYear}">





        <div class="text-danger"

             th:if="${#fields.hasErrors('foundationYear')}"

             th:errors="*{foundationYear}">

        </div>









        <label class="form-label mt-3">

            Logo squadra

        </label>






        <input class="form-control"

               type="file"

               name="file">







        <div class="mt-3"

             th:if="${team.image != null}">


            <p>

                Immagine attuale

            </p>



            <img th:src="@{'/images/' + ${team.image}}"

                 width="120"

                 class="rounded shadow">


        </div>











        <button class="btn btn-primary mt-4"

                type="submit">


            Salva squadra


        </button>






    </form>






</div>






</body>


</html>
