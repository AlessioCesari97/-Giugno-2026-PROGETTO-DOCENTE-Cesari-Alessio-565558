<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">


<head>

    <title>Giocatore</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>



<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>





<div class="container page-box text-center">





    <h1>


        <span th:text="${player.firstName}">

        </span>


        <span th:text="${player.lastName}">

        </span>



    </h1>






    <img th:if="${player.image != null}"


         th:src="@{'/images/' + ${player.image}}"


         class="player-photo mb-4">







    <h3 th:text="${player.role}">

    </h3>







    <p class="mt-3">


        Altezza:


        <strong>

            <span th:text="${player.height}">

            </span>

            cm

        </strong>


    </p>








    <p>


        Squadra:


        <a class="btn btn-outline-primary"


           th:href="@{/teams/{id}(id=${player.team.id})}"


           th:text="${player.team.name}">


        </a>



    </p>









    <a class="btn btn-secondary mt-3"


       href="javascript:history.back()">



        ← Indietro



    </a>







</div>



</body>


</html>
