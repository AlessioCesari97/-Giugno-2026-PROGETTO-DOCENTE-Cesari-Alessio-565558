<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Gestione Giocatori</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">



    <link rel="stylesheet"
          href="/css/style.css">



</head>






<body>





<div th:replace="~{fragments/navbar :: navbar}">

</div>







<div class="container page-box">






    <h1>

        Gestione Giocatori

    </h1>







    <a href="/admin/players/new"

       class="btn btn-primary mb-3">



        + Nuovo giocatore



    </a>











    <table class="table table-hover">







        <thead>




        <tr>



            <th>

                Foto

            </th>



            <th>

                Nome

            </th>



            <th>

                Cognome

            </th>




            <th>

                Ruolo

            </th>





            <th>

                Squadra

            </th>




            <th>

                Azioni

            </th>





        </tr>





        </thead>









        <tbody>







        <tr th:each="player : ${players}">








            <td>



                <img th:if="${player.image != null}"

                     th:src="@{'/images/' + ${player.image}}"

                     width="70"

                     class="rounded shadow">



            </td>








            <td th:text="${player.firstName}">

            </td>







            <td th:text="${player.lastName}">

            </td>







            <td th:text="${player.role}">

            </td>








            <td th:text="${player.team.name}">

            </td>









            <td>








                <a class="btn btn-warning btn-sm"


                   th:href="@{/admin/players/edit/{id}(id=${player.id})}">



                    Modifica



                </a>









                <form th:action="@{/admin/players/delete/{id}(id=${player.id})}"


                      method="post"


                      style="display:inline">







                    <button class="btn btn-danger btn-sm"


                            onclick="return confirm('Eliminare giocatore?')">





                        Elimina






                    </button>







                </form>







            </td>








        </tr>







        </tbody>








    </table>








</div>








</body>


</html>
