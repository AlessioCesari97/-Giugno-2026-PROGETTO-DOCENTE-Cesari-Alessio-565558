<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">



<head>


    <title>Gestione Tornei</title>




    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">



    <link rel="stylesheet"
          href="/css/style.css">



</head>







<body>




<div th:replace="~{fragments/navbar :: navbar}">

</div>








<div class="container page-box">








    <h1>

        Gestione Tornei

    </h1>









    <a href="/admin/tournaments/new"
       class="btn btn-primary mb-3">



        + Nuovo torneo



    </a>



    <div class="alert alert-success"
         th:if="${success}"
         th:text="${success}">
    </div>


    <div class="alert alert-danger"
         th:if="${error}"
         th:text="${error}">
    </div>







    <table class="table table-hover">








        <thead>





        <tr>



            <th>

                Nome

            </th>




            <th>

                Anno

            </th>





            <th>

                Descrizione

            </th>





            <th>

                Azioni

            </th>






        </tr>






        </thead>









        <tbody>








        <tr th:each="tournament : ${tournaments}">









            <td th:text="${tournament.name}">

            </td>








            <td th:text="${tournament.year}">

            </td>









            <td th:text="${tournament.description}">

            </td>









            <td>









                <a class="btn btn-warning btn-sm"


                   th:href="@{/admin/tournaments/edit/{id}(id=${tournament.id})}">



                    Modifica




                </a>













                <form th:action="@{/admin/tournaments/delete/{id}(id=${tournament.id})}"


                      method="post"


                      style="display:inline">








                    <button class="btn btn-danger btn-sm"


                            onclick="return confirm('Eliminare torneo?')">





                        Elimina





                    </button>










                </form>









            </td>











        </tr>









        </tbody>









    </table>









</div>









</body>




</html>
