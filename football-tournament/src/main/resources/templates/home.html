<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Football Tournament</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>






<div class="container page-box home-box">





    <h1>

        ⚽ Football Tournament

    </h1>





    <p class="lead">

        Sistema informativo per la gestione di tornei di calcio

    </p>








    <div class="row mt-5">








        <div class="col-md-4">



            <div class="dashboard-card">



                <h3>

                    🏆 Tornei

                </h3>




                <p>

                    Consulta tornei, squadre partecipanti e classifiche.

                </p>





                <a class="btn btn-primary"

                   th:href="@{/tournaments}">



                    Apri



                </a>




            </div>



        </div>









        <div class="col-md-4">



            <div class="dashboard-card">



                <h3>

                    ⚽ Partite

                </h3>





                <p>

                    Visualizza calendario, risultati e commenti.

                </p>






                <a class="btn btn-success"

                   th:href="@{/matches}">



                    Apri



                </a>




            </div>



        </div>









        <div class="col-md-4">



            <div class="dashboard-card">



                <h3>

                    👥 Squadre

                </h3>





                <p>

                    Guarda squadre, rose e dettagli dei giocatori.

                </p>






                <a class="btn btn-warning"

                   th:href="@{/teams}">



                    Apri



                </a>




            </div>



        </div>






    </div>




</div>




</body>


</html>
