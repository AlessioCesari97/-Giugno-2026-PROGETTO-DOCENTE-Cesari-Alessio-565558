<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Partita</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>





<body>





<div th:replace="~{fragments/navbar :: navbar}">

</div>








<div class="container page-box form-box">





    <h1>

        Gestione Partita

    </h1>





    <div class="alert alert-danger"
         th:if="${error}"
         th:text="${error}">

    </div>








    <form th:action="@{/admin/matches/save}"

          th:object="${match}"

          method="post">







        <input type="hidden"

               th:field="*{id}">










        <label class="form-label">

            Squadra casa

        </label>




        <select class="form-select"

                th:field="*{homeTeam}">


            <option th:each="team:${teams}"

                    th:value="${team.id}"

                    th:text="${team.name}">


            </option>


        </select>









        <label class="form-label mt-3">

            Squadra trasferta

        </label>




        <select class="form-select"

                th:field="*{awayTeam}">


            <option th:each="team:${teams}"

                    th:value="${team.id}"

                    th:text="${team.name}">


            </option>


        </select>










        <label class="form-label mt-3">

            Torneo

        </label>




        <select class="form-select"

                th:field="*{tournament}">


            <option th:each="tournament:${tournaments}"

                    th:value="${tournament.id}"

                    th:text="${tournament.name}">


            </option>


        </select>









        <label class="form-label mt-3">

            Arbitro

        </label>




        <select class="form-select"

                th:field="*{referee}">


            <option th:each="referee:${referees}"

                    th:value="${referee.id}"

                    th:text="${referee.firstName + ' ' + referee.lastName}">


            </option>


        </select>









        <label class="form-label mt-3">

            Luogo

        </label>



        <input class="form-control"

               type="text"

               th:field="*{location}">









        <label class="form-label mt-3">

            Data e ora

        </label>



        <input class="form-control"

               type="datetime-local"

               th:field="*{dateTime}">










        <label class="form-label mt-3">

            Stato partita

        </label>




        <select class="form-select"

                id="status"

                th:field="*{status}">


            <option value="SCHEDULED">

                Programmata

            </option>



            <option value="PLAYED">

                Giocata

            </option>


        </select>









        <div id="scoreBox">





            <label class="form-label mt-3">

                Goal casa

            </label>




            <input class="form-control"

                   id="goalsHome"

                   type="number"

                   th:field="*{goalsHome}">









            <label class="form-label mt-3">

                Goal trasferta

            </label>



            <input class="form-control"

                   id="goalsAway"

                   type="number"

                   th:field="*{goalsAway}">





        </div>










        <button class="btn btn-primary mt-4"

                type="submit">


            Salva partita


        </button>







    </form>





</div>









<script>



    const statusSelect =
        document.getElementById("status");



    const scoreBox =
        document.getElementById("scoreBox");



    const goalsHome =
        document.getElementById("goalsHome");



    const goalsAway =
        document.getElementById("goalsAway");








    function updateScoreBox(){



        if(statusSelect.value === "PLAYED"){



            scoreBox.style.display =
                "block";



            goalsHome.disabled =
                false;



            goalsAway.disabled =
                false;



        }


        else{



            scoreBox.style.display =
                "none";



            goalsHome.disabled =
                true;



            goalsAway.disabled =
                true;



            goalsHome.value =
                "";



            goalsAway.value =
                "";



        }



    }







    statusSelect.addEventListener(

        "change",

        updateScoreBox

    );




    updateScoreBox();



</script>






</body>


</html>
