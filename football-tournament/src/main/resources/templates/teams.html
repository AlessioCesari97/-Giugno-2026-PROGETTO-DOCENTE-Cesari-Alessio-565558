<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Squadre</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>


<div th:replace="~{fragments/navbar :: navbar}">
</div>





<div class="container page-box">



    <h1>

        Squadre

    </h1>






    <div class="row">



        <div class="col-md-4"
             th:each="team : ${teams}">




            <div class="dashboard-card">



                <h3 th:text="${team.name}">

                </h3>



                <p th:text="${team.city}">

                </p>





                <a class="btn btn-primary"

                   th:href="@{/teams/{id}(id=${team.id})}">



                    Visualizza


                </a>




            </div>




        </div>





    </div>





</div>






</body>



</html>
