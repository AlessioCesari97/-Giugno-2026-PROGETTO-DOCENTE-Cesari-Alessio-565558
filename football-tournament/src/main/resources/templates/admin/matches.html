<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Gestione Partite</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>




<div th:replace="~{fragments/navbar :: navbar}">

</div>







<div class="container page-box">



    <h1>

        Gestione Partite

    </h1>




    <a href="/admin/matches/new"
       class="btn btn-primary mb-3">

        + Nuova partita

    </a>







    <table class="table table-hover">


        <thead>


        <tr>


            <th>Casa</th>

            <th>Trasferta</th>

            <th>Stato</th>

            <th>Risultato</th>

            <th>Azioni</th>


        </tr>


        </thead>






        <tbody>



        <tr th:each="match:${matches}">



            <td th:text="${match.homeTeam.name}">

            </td>



            <td th:text="${match.awayTeam.name}">

            </td>




            <td th:text="${match.status}">

            </td>





            <td>


<span th:if="${match.status.name()=='PLAYED'}"

      th:text="${match.goalsHome + ' - ' + match.goalsAway}">


</span>



                <span th:if="${match.status.name()=='SCHEDULED'}">

-

</span>


            </td>






            <td>





                <a th:if="${match.status.name()=='SCHEDULED'}"

                   th:href="@{/admin/matches/edit/{id}(id=${match.id})}"

                   class="btn btn-warning btn-sm">


                    Modifica


                </a>








                <form th:action="@{/admin/matches/delete/{id}(id=${match.id})}"

                      method="post"

                      style="display:inline">



                    <button class="btn btn-danger btn-sm">


                        Elimina


                    </button>



                </form>






            </td>






        </tr>



        </tbody>



    </table>





</div>





</body>



</html>
