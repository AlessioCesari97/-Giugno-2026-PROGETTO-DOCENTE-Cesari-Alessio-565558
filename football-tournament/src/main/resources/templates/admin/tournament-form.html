<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Torneo</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>






<div class="container page-box form-box">



    <h1>

        Gestione Torneo

    </h1>







    <form th:action="@{/admin/tournaments/save}"

          th:object="${tournament}"

          method="post">






        <input type="hidden"

               th:field="*{id}">








        <label class="form-label">

            Nome torneo

        </label>





        <input class="form-control"

               type="text"

               th:field="*{name}">





        <div class="text-danger"

             th:if="${#fields.hasErrors('name')}"

             th:errors="*{name}">

        </div>









        <label class="form-label mt-3">

            Anno

        </label>





        <input class="form-control"

               type="number"

               th:field="*{year}">





        <div class="text-danger"

             th:if="${#fields.hasErrors('year')}"

             th:errors="*{year}">

        </div>










        <label class="form-label mt-3">

            Descrizione

        </label>





        <textarea class="form-control"

                  rows="4"

                  th:field="*{description}">

        </textarea>









        <label class="form-label mt-3">

            Squadre partecipanti

        </label>






        <select class="form-select"

                multiple

                size="6"

                th:field="*{teams}">






            <option th:each="team : ${teams}"

                    th:value="${team.id}"

                    th:text="${team.name}">



            </option>





        </select>







        <small class="text-muted">

            Tieni premuto CTRL per selezionare più squadre

        </small>








        <br>






        <button class="btn btn-primary mt-4"

                type="submit">


            Salva torneo


        </button>







    </form>




</div>





</body>


</html>
