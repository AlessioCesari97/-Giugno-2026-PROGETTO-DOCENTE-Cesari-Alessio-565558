<!DOCTYPE html>


<html xmlns:th="http://www.thymeleaf.org">


<head>


    <title>Partite</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="/css/style.css">


</head>




<body>



<div th:replace="~{fragments/navbar :: navbar}">

</div>






<div class="container page-box">



    <h1>

        Calendario Partite

    </h1>







    <div class="match-list-card"
         th:each="match : ${matches}">





        <h3>


            <span th:text="${match.homeTeam.name}">

            </span>



            VS



            <span th:text="${match.awayTeam.name}">

            </span>



        </h3>






        <p>


            Stato:


            <span class="badge bg-success"
                  th:text="${match.status}">


            </span>


        </p>







        <a class="btn btn-primary"

           th:href="@{/matches/{id}(id=${match.id})}">



            Dettagli partita



        </a>






    </div>








    <a href="/tournaments"

       class="btn btn-secondary mt-4">



        Torna ai tornei



    </a>







</div>





</body>


</html>
